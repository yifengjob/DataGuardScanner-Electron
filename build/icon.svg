<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="2048" viewBox="0 0 2048 2048">
  <defs>
    <!-- 图标外阴影：增加底座的立体感 -->
    <filter id="dockShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="25" flood-color="#000000" flood-opacity="0.2"/>
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    
    <!-- 清爽的浅色磨砂玻璃渐变背景（Mac 风格） -->
    <radialGradient id="bgGradient" cx="50%" cy="30%" r="80%" fx="50%" fy="20%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E5E5EA" />
    </radialGradient>
    
    <!-- 顶部高光：增强玻璃质感 -->
    <radialGradient id="topHighlight" cx="50%" cy="0%" r="100%" fx="50%" fy="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="20%" stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0"/>
    </radialGradient>
    
    <!-- 底部内阴影：增加视觉重量 -->
    <linearGradient id="bottomShadow" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.0"/>
    </linearGradient>
  </defs>
  
  <!-- 大圆角矩形背景（Mac 图标风格，圆角半径 450，外侧透明） -->
  <rect x="0" y="0" width="2048" height="2048" rx="450" ry="450" fill="url(#bgGradient)" filter="url(#dockShadow)"/>
  
  <!-- 顶部高光层 -->
  <rect x="0" y="0" width="2048" height="2048" rx="450" ry="450" fill="url(#topHighlight)"/>
  
  <!-- 底部内阴影层 -->
  <rect x="0" y="0" width="2048" height="2048" rx="450" ry="450" fill="url(#bottomShadow)"/>
  
  <!-- 外围极细光线描边，增强边缘轮廓 -->
  <rect x="0" y="0" width="2048" height="2048" rx="450" ry="450" fill="none" stroke="#FFFFFF" stroke-opacity="0.8" stroke-width="4"/>
  
  <!-- 绿色打勾图标（居中放置，进一步放大至视觉协调大小） -->
  <g transform="translate(1024, 1024) scale(90) translate(-12, -12)">
    <g fill="none" fill-rule="evenodd">
      <!-- 原始 SVG 路径（保持原样，仅做位置和大小调整） -->
      <path d="m12.593 23.258l-.011.002l-.071.035l-.02.004l-.014-.004l-.071-.035q-.016-.005-.024.005l-.004.01l-.017.428l.005.02l.01.013l.104.074l.015.004l.012-.004l.104-.074l.012-.016l.004-.017l-.017-.427q-.004-.016-.017-.018m.265-.113l-.013.002l-.185.093l-.01.01l-.003.011l.018.43l.005.012l.008.007l.201.093q.019.005.029-.008l.004-.014l-.034-.614q-.005-.018-.02-.022m-.715.002a.02.02 0 0 0-.027.006l-.006.014l-.034.614q.001.018.017.024l.015-.002l.201-.093l.01-.008l.004-.011l.017-.43l-.003-.012l-.01-.01z" />
      <path fill="#197529" d="M11.298 2.195a2 2 0 0 1 1.232-.055l.172.055l7 2.625a2 2 0 0 1 1.291 1.708l.007.165v5.363a9 9 0 0 1-4.709 7.911l-.266.139l-3.354 1.677a1.5 1.5 0 0 1-1.198.062l-.144-.062l-3.354-1.677a9 9 0 0 1-4.97-7.75l-.005-.3V6.693a2 2 0 0 1 1.145-1.808l.153-.065zm4.135 6.434l-4.598 4.598l-1.768-1.768a1 1 0 0 0-1.414 1.415l2.404 2.404a1.1 1.1 0 0 0 1.556 0l5.234-5.235a1 1 0 1 0-1.414-1.414" stroke-width="0.5" stroke="#197529" />
    </g>
  </g>
</svg>